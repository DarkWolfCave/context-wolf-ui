name: 🐛 Bug Report (English)
description: Something is broken or behaves unexpectedly
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! The more detail you
        provide, the faster we can help.

  - type: input
    id: version
    attributes:
      label: ContextWolf UI version
      description: "Run: `docker images | grep context-wolf-ui` (e.g. v0.1.0)"
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I click X, Y happens instead of Z…"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '…'
        2. Click on '…'
        3. See error '…'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: The more, the better.
      value: |
        - OS:
        - Browser:
        - Docker version:
        - ContextWolf CLI version:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Backend logs (last ~50 lines)
      description: "Run: `docker compose logs backend --tail 50`"
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, browser console errors, anything else relevant.
